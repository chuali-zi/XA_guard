name: xa-guard-reference

x-python-service: &python-service
  build:
    context: .
    dockerfile: docker/reference.Dockerfile
  image: xa-guard-reference:0.2.0
  restart: unless-stopped
  environment: &runtime-environment
    PYTHONPATH: /app/src:/app
    XA_GUARD_DEPLOYMENT_PROFILE: reference
    XA_GUARD_AUDIT_BACKEND: postgresql
    XA_GUARD_KEY_PROVIDER: local
    XA_GUARD_TEST_FAULTS: ${XA_GUARD_TEST_FAULTS:-false}
    XA_GUARD_CONTROL_TIMING: ${XA_GUARD_CONTROL_TIMING:-false}
    XA_GUARD_DB_COMMIT_DELAY_US: ${XA_GUARD_DB_COMMIT_DELAY_US:-0}
    XA_GUARD_DATABASE_URL_FILE: /run/secrets/database_url
    XA_GUARD_KEK_KEYRING_FILE: /run/secrets/kek_keyring
    XA_GUARD_INTERNAL_AUTH_KEY_FILE: /run/secrets/internal_auth_key
    REFERENCE_BUSINESS_API_KEY_FILE: /run/secrets/business_api_key
    REFERENCE_BUSINESS_API_URL: http://business-api:8081
    XA_GUARD_OIDC_ISSUER: http://localhost:13081/realms/xa-guard
    XA_GUARD_OIDC_BACKCHANNEL_BASE_URL: http://keycloak:8080
    XA_GUARD_OIDC_AUDIENCE: xa-guard-api
    XA_GUARD_OIDC_INTROSPECTION_CLIENT_ID: xa-guard-api
    XA_GUARD_OIDC_INTROSPECTION_CLIENT_SECRET_FILE: /run/secrets/api_client_secret
    XA_GUARD_REFERENCE_CONFIG: configs/xa-guard.reference.yaml
  secrets: &runtime-secrets
    - database_url
    - kek_keyring
    - internal_auth_key
    - business_api_key
    - api_client_secret
  volumes:
    - reference-audit:/app/logs

services:
  postgres:
    image: postgres:17.6-bookworm@sha256:f3bd19c606e442c3d7bdfa8002e03fe260a1023351e0ea4598032022b68dd6e3
    restart: unless-stopped
    environment:
      POSTGRES_USER: xaguard
      POSTGRES_DB: xaguard
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-keycloak.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xaguard -d xaguard"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [identity, data]

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0@sha256:2eb3cd316835c990e69e26ade292ffa78f6fb0db7d5fc6377463c162e1979ac0
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        export KC_DB_PASSWORD="$$(cat /run/secrets/postgres_password)"
        export KC_BOOTSTRAP_ADMIN_PASSWORD="$$(cat /run/secrets/keycloak_admin_password)"
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm \
          --health-enabled=true --metrics-enabled=true \
          --hostname=http://localhost:13081 --hostname-backchannel-dynamic=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: xaguard
      KC_BOOTSTRAP_ADMIN_USERNAME: kc-admin
    secrets:
      - postgres_password
      - keycloak_admin_password
    volumes:
      - ${REFERENCE_RUNTIME:-.runtime/reference}/realm.json:/opt/keycloak/data/import/xa-guard-realm.json:ro
    ports:
      - "127.0.0.1:13081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [identity, data]

  migration:
    <<: *python-service
    restart: "no"
    command: ["python", "-m", "xa_guard.control.migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [data]

  assignment-seed:
    <<: *python-service
    restart: "no"
    command: ["python", "-m", "xa_guard.control.seed"]
    depends_on:
      migration:
        condition: service_completed_successfully
    networks: [data]

  business-api:
    <<: *python-service
    command: ["python", "-m", "xa_guard.reference.ticket_api"]
    environment:
      <<: *runtime-environment
      PORT: "8081"
    ports:
      - "127.0.0.1:13082:8081"
    depends_on:
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [business, data, acceptance]

  xa-guard:
    <<: *python-service
    command: ["python", "-m", "xa_guard.control.api"]
    environment:
      <<: *runtime-environment
      PORT: "8080"
    ports:
      - "127.0.0.1:13000:8080"
    depends_on:
      keycloak:
        condition: service_healthy
      assignment-seed:
        condition: service_completed_successfully
      business-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [identity, business, data, console]

  worker:
    <<: *python-service
    command: ["python", "-m", "xa_guard.control.worker"]
    environment:
      <<: *runtime-environment
      PORT: "8082"
    depends_on:
      xa-guard:
        condition: service_healthy
    networks: [business, data]

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    image: xa-guard-console:0.2.0
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:13081
      KEYCLOAK_REALM: xa-guard
      KEYCLOAK_CLIENT_ID: general-office-agent
      KEYCLOAK_CLIENT_SECRET_FILE: /run/secrets/bff_client_secret
      OIDC_EXCHANGE_AUDIENCE: xa-guard-api
      CONTROL_API_URL: http://xa-guard:8080
      PORT: "8080"
    secrets:
      - bff_client_secret
    ports:
      - "127.0.0.1:13080:8080"
    depends_on:
      xa-guard:
        condition: service_healthy
    networks: [identity, console]

secrets:
  postgres_password:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/postgres_password
  database_url:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/database_url
  keycloak_admin_password:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/keycloak_admin_password
  bff_client_secret:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/bff_client_secret
  api_client_secret:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/api_client_secret
  business_api_key:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/business_api_key
  internal_auth_key:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/internal_auth_key
  kek_keyring:
    file: ${REFERENCE_RUNTIME:-.runtime/reference}/secrets/kek_keyring

volumes:
  postgres-data:
  reference-audit:

networks:
  identity:
    internal: false
  business:
    internal: true
  data:
    internal: true
  console:
    internal: true
  acceptance:
    # A host-facing bridge is required for the localhost-only direct business
    # baseline used by paired performance acceptance. No other service joins it.
    internal: false
