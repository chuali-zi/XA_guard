# XA-Guard baseline 策略层清单（L0 / 不可变层）
#
# 本文件由 src/xa_guard/policy/layered.py 加载。
# 列出的所有文件都被视为"项目内置国标兜底"——
# 任何企业 overlay 都不能删除/覆盖/弱化其中的条目。
# 单调性检查（monotonicity）由 layered._check_monotonic 强制执行。
#
# 不要在这里直接写规则；规则继续放在各自的 yaml 文件里，
# 本清单只声明 "哪些 yaml 属于 baseline 层"。

metadata:
  layer: baseline
  version: "0.1"
  description: "L0 国标兜底层 — 等保 2.0 三级 + GB/T 45654-2025 + TC260-003"
  immutable: true                # 运行时只读
  sources:
    - "GB/T 22239-2019 信息安全技术 网络安全等级保护基本要求"
    - "GB/T 45654-2025 网络安全技术 生成式人工智能服务安全基本要求"
    - "TC260-003 生成式人工智能服务安全基本要求"

# 3 类资源，对应 Gate2 / Gate3 / Gate4 的需求
# 注意：gate2_tool_risks.yaml 已废弃——risk_level 的唯一事实源见
#       policies/baseline/gate4_capabilities.yaml（risk_level 字段）
#       和 docs/risk_classification_basis.md（法规分级依据）。
# Gate2 运行时 risk 由 layered.py 从 tool_capabilities 中的 risk_level 派生，
# 不再单独声明 tool_risks 资源。
resources:
  policy_rules:                  # Gate3 用：gate3_rules 30 条
    file: policies/baseline/gate3_rules.yaml
    rule_id_namespace: ""        # baseline 无前缀，历史 id 不动
  tool_capabilities:             # Gate4 / Gate2 用：工具能力 + 污点上限 + risk_level（唯一源）
    file: policies/baseline/gate4_capabilities.yaml
  sensitive_patterns:            # Gate4 用：敏感词正则
    file: policies/baseline/gate4_sensitive_patterns.yaml
