# Gate4 三色污点扫描的敏感关键字 / 正则库
# 这里是 baseline 层（项目内置，等保 2.0 / GB/T 45654-2025 兜底）。
# 命中任意一条 → 推断为 CONFIDENTIAL 标签。
#
# 企业 overlay 可追加自己的敏感词（如内部代号、客户编号格式），
# 但不能从 baseline 删除任何条目（layered.monotonicity 校验）。
#
# 字段说明：
#   patterns: 正则字符串列表，运行时合并为单一 union 正则；区分大小写见 case_insensitive
#   case_insensitive: 默认 true
metadata:
  name: baseline-sensitive-patterns
  version: "0.1"
  sources:
    - "GB/T 45654-2025 附录 A.1 个人信息条款"
    - "等保 2.0 三级 数据安全要求"

case_insensitive: true

patterns:
  # 中文敏感分类
  - "密码"
  - "密钥"
  - "手机号"
  - "银行卡"
  - "医疗健康"
  - "金融账户"
  - "行踪轨迹"
  - "敏感个人信息"
  - "身份证"
  # 结构化个人信息 / 主体标识（regex 兜底，不替代校验位、Luhn 或定密规则）
  - "\\b[1-9]\\d{5}(18|19|20)\\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\\d|3[01])\\d{3}[0-9Xx]\\b"
  - "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
  - "(?<!\\d)(?:\\d[ -]?){13,19}(?!\\d)"
  - "\\b[0-9A-HJ-NPQRTUWXY]{2}\\d{6}[0-9A-HJ-NPQRTUWXY]{10}\\b"
  - "\\b[A-Z0-9._%+\\-]+@[A-Z0-9.\\-]+\\.[A-Z]{2,}\\b"
  - "\\b(?:10(?:\\.\\d{1,3}){3}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2}|127(?:\\.\\d{1,3}){3}|169\\.254(?:\\.\\d{1,3}){2})\\b"
  # 凭据与密钥
  - "password"
  - "passwd"
  - "\\bpwd\\b"
  - "access[_\\-]key"
  - "secret[_\\-]key"
  - "\\bBearer\\s+[A-Za-z0-9._~+\\-/]+=*"
  - "\\beyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}\\b"
  - "\\b(?:api|access|secret|private|auth|session)[_\\- ]?(?:key|token|secret)\\b\\s*[:=]\\s*[\"']?[A-Za-z0-9._~+\\-/]{16,}[\"']?"
  - "-----BEGIN [A-Z ]*PRIVATE KEY-----"
  - "AKIA[0-9A-Z]{16}"
  - "ghp_[A-Za-z0-9_]{36}"
  # 政企密级 / 内部流转标识（关键词兜底，不替代正式定密流程）
  - "(?:秘密|机密|绝密)\\s*(?:★|\\*)?\\s*(?:\\d+\\s*年|长期|永久)?"
  - "(?:秘密级|机密级|绝密级|国家秘密|工作秘密|商业秘密|商密)"
  - "(?:内部资料|内部文件|内部使用|内部流转|内部公开|不得外传|严禁外传|禁止外传|涉密|保密)"
