# 工具能力声明（关卡 4 用）
# 子 agent G4 / D 扩展。每个新工具上线都要在这里登记。
#
# capabilities: 工具能做什么（信息流可达性）
#   NETWORK_EXTERNAL  外网访问
#   NETWORK_INTERNAL  内网访问
#   FS_READ           读文件
#   FS_WRITE          写文件
#   EXEC              执行命令
#   NOTIFY            外发消息
#   DATA_EXPORT       数据导出
#   DATA_INGEST       数据采集 / 入训
#   POLICY_ADMIN      策略变更
#   AUTHZ_ADMIN       权限变更
#   AUDIT_ADMIN       审计配置 / 清理
#   MODEL_CALL        模型调用
#   MODEL_TRAINING    模型训练 / 微调
#   MODEL_DEPLOY      模型上线 / 切换
#   CONTENT_PUBLISH   内容发布 / 推荐
#   PAYMENT           支付动作
#
# input_max_taint: 工具能接受的最高数据敏感度
# output_taint:    工具输出的固定标签
# risk_level:      green / yellow / red

tools:
  - tool_name: list_servers
    capabilities: [NETWORK_INTERNAL, FS_READ]
    input_max_taint: PUBLIC
    output_taint: INTERNAL
    risk_level: green

  - tool_name: get_cpu
    capabilities: [NETWORK_INTERNAL]
    input_max_taint: PUBLIC
    output_taint: INTERNAL
    risk_level: green

