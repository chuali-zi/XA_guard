xa_guard:
  upstream:
    transport: streamable-http
    host: 0.0.0.0
    port: 8080

  downstream: []

  # Dynamic PostgreSQL assignments are enforced by the control application.
  # This file remains the immutable Agent/tool/data-domain ceiling.
  governance:
    enabled: false
    registry_file: configs/governance.enterprise-static.yaml
    default_tenant: acme-corp

  gates:
    gate1:
      enabled: true
      patterns_file: policies/baseline/gate1_input_patterns.yaml
    gate2:
      enabled: true
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      elicitation_fallback: stdout
    gate3:
      enabled: true
      backend: python
      policy_file: policies/baseline/gate3_rules.yaml
    gate4:
      enabled: true
      strict_mode: true
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
    gate5:
      enabled: false
    gate6:
      enabled: true
      audit_dir: ./logs/reference-audit
      hash_algo: sha256
      signature_mode: none

  tool_capabilities_file: policies/baseline/gate4_capabilities.yaml

