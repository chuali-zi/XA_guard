xa_guard:
  upstream:
    transport: streamable-http
    host: 127.0.0.1
    port: 18765
    session_idle_timeout_seconds: 60

  downstream:
    - name: ops_target
      command: ["python", "-m", "demo.targets.ops_target"]
      transport: stdio

  gates:
    gate1:
      enabled: true
      detectors:
        - name: rule
          type: rule
          enabled: true
          patterns_file: policies/baseline/gate1_input_patterns.yaml
      patterns_file: policies/baseline/gate1_input_patterns.yaml
    gate2:
      enabled: true
      hitl_required_for: [red]
      elicitation_fallback: deny
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      prefer_layered: false
    gate3:
      enabled: true
      backend: python
      policy_file: policies/baseline/gate3_rules.yaml
      prefer_layered: false
    gate4:
      enabled: true
      strict_mode: false
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
      prefer_layered: false
    gate5:
      enabled: false
    gate6:
      enabled: true
      audit_dir: ./logs/opencode-http
      hash_algo: sha256
    policy_layered:
      enabled: false

  pending_approvals_path: ./logs/opencode-http/pending_approvals.jsonl
