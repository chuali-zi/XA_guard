# Linux gVisor profile. Used with deploy/gvisor/docker-compose.gvisor.yml.
xa_guard:
  upstream:
    transport: streamable-http
    host: 0.0.0.0
    port: 3000
    session_idle_timeout_seconds: 300
  downstream:
    - name: ops_target
      command: ["python", "-m", "demo.targets.ops_target"]
      transport: stdio
      tools:
        - name: list_servers
          description: List managed servers and status
          inputSchema: {type: object, properties: {}, required: []}
        - name: get_cpu
          description: Query CPU usage for a host
          inputSchema:
            type: object
            properties: {host: {type: string}}
            required: [host]
        - name: restart_service
          description: Simulate restarting a service
          inputSchema:
            type: object
            properties: {host: {type: string}, name: {type: string}}
            required: [host, name]
        - name: read_log
          description: Read log content
          inputSchema:
            type: object
            properties: {path: {type: string}}
            required: [path]
        - name: exec_command
          description: Simulate a shell command on a host
          inputSchema:
            type: object
            properties: {host: {type: string}, cmd: {type: string}}
            required: [host, cmd]
        - name: send_notification
          description: Simulate sending a notification
          inputSchema:
            type: object
            properties: {channel: {type: string}, msg: {type: string}}
            required: [channel, msg]
        - name: send_email
          description: Simulate sending email
          inputSchema:
            type: object
            properties:
              to: {type: string, x-sensitive: true}
              body: {type: string, x-xa-guard-sensitive: true}
            required: [to, body]
  gates:
    gate1:
      enabled: true
      detectors:
        - name: rule
          type: rule
          enabled: true
          patterns_file: policies/baseline/gate1_input_patterns.yaml
      spotlighting: {enabled: true}
      patterns_file: policies/baseline/gate1_input_patterns.yaml
    gate2:
      enabled: true
      hitl_required_for: [red]
      elicitation_fallback: stdout
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      approval_token_ttl_seconds: 300
      prefer_layered: true
    gate3:
      enabled: true
      backend: python
      policy_file: policies/baseline/gate3_rules.yaml
      prefer_layered: true
    gate4:
      enabled: true
      strict_mode: false
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
      prefer_layered: true
    gate5:
      enabled: true
      docker_image: xa-guard/sandbox:latest
      runtime: runsc
      network_disabled: true
      readonly_rootfs: true
      memory: 256m
      cpus: "1"
      pids_limit: 128
      sandbox_all_tools: true
      workspace_mount: false
      workspace_target: /workspace
      workspace_readonly: true
    gate6:
      enabled: true
      audit_dir: ./logs/audit
      hash_algo: sha256
      signature_mode: none
      enable_sm2_signature: false
      sm2_key_path: ""
    policy_layered:
      enabled: true
      baseline_manifest: policies/baseline/manifest.yaml
      overlay_root: policies/overlay
      hot_reload: true
  policy_default: enterprise-l3-gvisor
  audit_dir: ./logs/audit
  log_dir: ./logs/runtime
  pending_approvals_path: ./logs/runtime/pending_approvals.jsonl
  tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
