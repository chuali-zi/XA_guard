# XA-Guard demo 默认配置
# 详细 schema 见 src/xa_guard/config.py

xa_guard:
  upstream:
    transport: stdio          # stdio | streamable-http
    host: 127.0.0.1
    port: 3000

  downstream:
    - name: ops_target
      command: ["python", "-m", "demo.targets.ops_target"]
      transport: stdio

  gates:
    gate1:
      enabled: true
      # v2 检测器架构：模型+YAML 混合。每个 detector 产出一组 DetectionLabel，
      #   fusion 引擎合并为最终 Decision（ALLOW/WARN/DENY）。
      # type=rule : YAML 关键词规则（零依赖，始终可用）。
      # type=model: 通用 ModelBackend 壳子；默认 backend=stub 处于 fail-open 模式
      #   （不阻塞 pipeline）。后续接入 Qwen3Guard/ShieldLM 只需改 backend 名字。
      detectors:
        - name: rule
          type: rule
          enabled: true
          patterns_file: policies/baseline/gate1_input_patterns.yaml
        - name: model_qwen
          type: model
          enabled: true
          backend: qwen3guard
          model_path: Qwen/Qwen3Guard-Gen-0.6B
          device: cpu
          threshold: 0.5
          timeout_ms: 200
          fail_open: true
          category_map_file: policies/baseline/category_maps/qwen3guard.yaml
          options:
            # Real Qwen3Guard-Gen inference. Set dry_run:true only for CI
            # environments that intentionally skip model weights.
            dry_run: false
            torch_dtype: float32
            max_new_tokens: 64
            controversial_score: 0.4
        # PromptGuard2 is gated by Meta. Enable after accepting the license and
        # setting HF_TOKEN in the environment.
        # - name: model_promptguard2
        #   type: model
        #   enabled: false
        #   backend: promptguard
        #   model_path: meta-llama/Llama-Prompt-Guard-2-86M
        #   threshold: 0.5
        #   fail_open: true
        #   category_map_file: policies/baseline/category_maps/promptguard.yaml
        #   options:
        #     device: cpu
        # - name: model_shieldlm
        #   type: model
        #   enabled: false              # 14B, needs ~26GB weights and much more RAM/VRAM
        #   backend: shieldlm
        #   model_path: thu-coai/ShieldLM-14B-qwen
        #   threshold: 0.5
        #   fail_open: true
        # TODO: category_map currently collapses S1-S14 → unsafe; refine policies/baseline/category_maps/llamaguard.yaml before enabling.
        # - name: model_llamaguard
        #   type: model
        #   enabled: false              # gated by Meta; 1B is ~5.6GB weights
        #   backend: llamaguard
        #   model_path: meta-llama/Llama-Guard-3-1B
        #   threshold: 0.5
        #   fail_open: true
        #   category_map_file: policies/baseline/category_maps/llamaguard.yaml
      spotlighting:
        enabled: true                   # 默认开启；非user来源加 <untrusted_source> 标记
      source_risk_weights:
        user: 1.0
        web: 1.5
        document: 1.5
        rag: 1.2
        memory: 1.1
        tool_result: 1.3
      # 可覆盖 deny 类目（默认用 fusion.DEFAULT_DENY_CATEGORIES）
      # deny_categories:
      #   - shell_dangerous
      #   - jailbreak_zh
      #   - jailbreak_en
      #   ...
      patterns_file: policies/baseline/gate1_input_patterns.yaml  # 兼容旧 config 读取路径

    gate2:
      enabled: true
      hitl_required_for: [red]
      elicitation_fallback: stdout    # stdout | async_notify | deny
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      approval_token_ttl_seconds: 300
      prefer_layered: true             # 生产模式：优先 baseline + overlay 合并视图

    gate3:
      enabled: true
      backend: python                  # python | rego
      policy_file: policies/baseline/gate3_rules.yaml
      prefer_layered: true

    gate4:
      enabled: true
      strict_mode: false               # true 时连 WARN 都阻断
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
      prefer_layered: true

    gate5:
      enabled: false                   # demo 默认禁用 Docker
      docker_image: xa-guard/sandbox:latest
      runtime: runc                    # runc | runsc(gVisor)
      network_disabled: true
      readonly_rootfs: true
      memory: 256m
      cpus: "1"
      pids_limit: 128
      workspace_mount: true
      workspace_target: /workspace
      workspace_readonly: true

    gate6:
      enabled: true
      audit_dir: ./logs/audit
      hash_algo: sha256                # sha256 | sm3
      enable_sm2_signature: false
      sm2_key_path: ""

    # 双层策略层（baseline + overlay + 单调性 + bundle_sha + 热加载）
    # 见 src/xa_guard/policy/layered.py + docs：对标 Google Model Armor Floor Settings
    # + AWS SCP（Deny 不被 IAM Allow 推翻）+ Gatekeeper ConstraintTemplate
    policy_layered:
      enabled: true
      baseline_manifest: policies/baseline/manifest.yaml
      overlay_root: policies/overlay
      hot_reload: true                  # watchfiles 不可用时自动降级

  policy_default: enterprise-l3
  audit_dir: ./logs/audit
  log_dir: ./logs/runtime
  tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
