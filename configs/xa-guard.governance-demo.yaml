# XA-Guard governance console/demo profile.
# Keeps the existing six-gate runtime local, but enables the enterprise
# governance preflight before Gate1.
xa_guard:
  upstream:
    transport: stdio
    host: 127.0.0.1
    port: 3000

  downstream:
    - name: ops_target
      command: ["python", "-m", "demo.targets.ops_target"]
      transport: stdio

  governance:
    enabled: true
    registry_file: configs/governance.demo.yaml
    default_tenant: acme-corp

  gates:
    gate1:
      enabled: true
      detectors:
        - name: rule
          type: rule
          enabled: true
          patterns_file: policies/baseline/gate1_input_patterns.yaml
      spotlighting:
        enabled: true
      patterns_file: policies/baseline/gate1_input_patterns.yaml

    gate2:
      enabled: true
      hitl_required_for: [red]
      elicitation_fallback: stdout
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      approval_token_ttl_seconds: 300
      prefer_layered: true

    gate3:
      enabled: true
      backend: python
      policy_file: policies/baseline/gate3_rules.yaml
      prefer_layered: true

    gate4:
      enabled: true
      strict_mode: false
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
      prefer_layered: true

    gate5:
      enabled: false

    gate6:
      enabled: true
      audit_dir: ./logs/governance-demo
      hash_algo: sha256
      signature_mode: none

    policy_layered:
      enabled: true
      baseline_manifest: policies/baseline/manifest.yaml
      overlay_root: policies/overlay
      hot_reload: true

  policy_default: enterprise-l3-governance-demo
  audit_dir: ./logs/governance-demo
  log_dir: ./logs/runtime
  pending_approvals_path: ./logs/runtime/governance_pending_approvals.jsonl
  tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
