# XA-Guard OpenCode HITL evidence profile.
# Variant of xa-guard.opencode-smoke.yaml with elicitation_fallback: stdout so
# red tools return REQUIRE_APPROVAL and the upstream pending-approval fallback
# (no elicitation client) can stage them for HITL — the L3 HITL evidence path.
# The canonical smoke profile keeps elicitation_fallback: deny (safe default,
# guarded by tests/unit/test_config.py); this profile opts into the pending
# path explicitly for the HITL demo.
xa_guard:
  upstream:
    transport: stdio

  downstream:
    - name: ops_target
      command: ["python", "-m", "demo.targets.ops_target"]
      transport: stdio

  gates:
    gate1:
      enabled: true
      detectors:
        - name: rule
          type: rule
          enabled: true
          patterns_file: policies/baseline/gate1_input_patterns.yaml
      patterns_file: policies/baseline/gate1_input_patterns.yaml
    gate2:
      enabled: true
      hitl_required_for: [red]
      # stdout -> red tools return REQUIRE_APPROVAL -> upstream stages pending
      # approval (opencode has no elicitation). This is the HITL evidence path.
      elicitation_fallback: stdout
      tool_risk_file: policies/baseline/gate2_tool_risks.yaml
      prefer_layered: false
    gate3:
      enabled: true
      backend: python
      policy_file: policies/baseline/gate3_rules.yaml
      prefer_layered: false
    gate4:
      enabled: true
      strict_mode: false
      tool_capabilities_file: policies/baseline/gate4_capabilities.yaml
      prefer_layered: false
    gate5:
      enabled: false
    gate6:
      enabled: true
      audit_dir: ./logs/opencode-hitl
      hash_algo: sha256
    policy_layered:
      enabled: false

  pending_approvals_path: ./logs/opencode-hitl/pending_approvals.jsonl
