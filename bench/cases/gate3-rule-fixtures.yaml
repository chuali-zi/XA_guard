metadata:
  name: gate3-rule-fixtures
  version: "0.1"
  policy_file: policies/baseline/gate3_rules.yaml
  note: Each Gate3 baseline rule must have one positive and one negative executable fixture.

fixtures:
  - rule_id: GBT-22239-8.1.4.4
    positive:
      case_id: G3F-P-001
      input_payload:
        tool_name: shell
        arguments: {cmd: uptime}
        risk_level: yellow
      expected_hit: true
      expected_decision: require_approval
    negative:
      case_id: G3F-N-001
      input_payload:
        tool_name: shell
        arguments: {cmd: uptime}
        risk_level: green
      expected_hit: false

  - rule_id: GBT-22239-8.1.4.5
    positive:
      case_id: G3F-P-002
      input_payload:
        tool_name: exec_command
        arguments: {cmd: "sudo rm -rf /"}
        user_role: ops
        risk_level: green
      expected_hit: true
      expected_decision: deny
    negative:
      case_id: G3F-N-002
      input_payload:
        tool_name: exec_command
        arguments: {cmd: "echo hello"}
        user_role: ops
        risk_level: green
      expected_hit: false

  - rule_id: GBT-45654-A.1.1
    positive:
      case_id: G3F-P-003
      input_payload:
        tool_name: send_email
        arguments: {to: ops@example.com}
        taint: CONFIDENTIAL
      expected_hit: true
      expected_decision: deny
    negative:
      case_id: G3F-N-003
      input_payload:
        tool_name: send_email
        arguments: {to: ops@example.com}
        taint: PUBLIC
      expected_hit: false

  - rule_id: GBT-45654-A.2.3
    positive:
      case_id: G3F-P-004
      input_payload:
        tool_name: write_file
        arguments: {path: /tmp/out.txt, content: "secret_key=prod"}
      expected_hit: true
      expected_decision: deny
    negative:
      case_id: G3F-N-004
      input_payload:
        tool_name: write_file
        arguments: {path: /tmp/out.txt, content: "hello world"}
      expected_hit: false

  - rule_id: TC260-003-7.2
    positive:
      case_id: G3F-P-005
      input_payload:
