{{- if .Values.networkPolicy.enabled }}
{{- $externalCidrs := .Values.networkPolicy.externalEgressCidrs -}}
{{- if .Values.referenceInfra.enabled -}}
{{- $externalCidrs = concat $externalCidrs .Values.referenceInfra.networkPolicy.externalEgressCidrs -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "xa-guard.fullname" . }}
  labels:
    {{- include "xa-guard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "xa-guard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "xa-guard.selectorLabels" . | nindent 14 }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "xa-guard.selectorLabels" . | nindent 14 }}
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- range $externalCidrs }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
            {{- with .except }}
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
