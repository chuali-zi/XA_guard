{{- if .Values.businessApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xa-guard.componentName" (dict "root" . "component" "business-api") }}
  labels:
    {{- include "xa-guard.componentLabels" (dict "root" . "component" "business-api") | nindent 4 }}
spec:
  replicas: {{ .Values.businessApi.replicas }}
  selector:
    matchLabels:
      {{- include "xa-guard.componentSelectorLabels" (dict "root" . "component" "business-api") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "xa-guard.componentSelectorLabels" (dict "root" . "component" "business-api") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.businessApi.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "xa-guard.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: business-api
          image: {{ include "xa-guard.image" (dict "root" . "image" .Values.businessApi.image) | quote }}
          imagePullPolicy: {{ .Values.businessApi.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.businessApi.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.businessApi.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "xa-guard.fullname" . }}-config
          env:
            - name: PORT
              value: {{ .Values.businessApi.containerPort | quote }}
            - name: XA_GUARD_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "global.externalSecrets.businessApi is required" .Values.global.externalSecrets.businessApi }}
                  key: {{ .Values.businessApi.databaseDsnSecretKey }}
            - name: REFERENCE_BUSINESS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.externalSecrets.businessApi }}
                  key: {{ .Values.businessApi.apiKeySecretKey }}
          ports:
            - name: http
              containerPort: {{ .Values.businessApi.containerPort }}
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "import time; time.sleep({{ .Values.businessApi.preStopDelaySeconds }})"]
          livenessProbe:
            httpGet:
              path: {{ .Values.businessApi.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.businessApi.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.businessApi.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.businessApi.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.businessApi.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.businessApi.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.businessApi.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.businessApi.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.businessApi.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.businessApi.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.businessApi.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
