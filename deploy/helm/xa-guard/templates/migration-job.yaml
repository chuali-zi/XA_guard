{{- if .Values.migration.enabled }}
{{- $migrationSuffix := default (toString .Release.Revision) .Values.migration.nameSuffix | trunc 20 | trimSuffix "-" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "xa-guard.fullname" . }}-migration-{{ $migrationSuffix }}
  labels:
    {{- include "xa-guard.componentLabels" (dict "root" . "component" "migration") | nindent 4 }}
    xa-guard.dev/migration-run: {{ $migrationSuffix | quote }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "xa-guard.componentSelectorLabels" (dict "root" . "component" "migration") | nindent 8 }}
        xa-guard.dev/migration-run: {{ $migrationSuffix | quote }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "xa-guard.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migration
          image: {{ include "xa-guard.image" (dict "root" . "image" .Values.migration.image) | quote }}
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.migration.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.migration.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "xa-guard.fullname" . }}-config
          env:
            - name: XA_GUARD_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ required "global.externalSecrets.runtime is required" .Values.global.externalSecrets.runtime }}
                  key: {{ .Values.global.postgres.dsnSecretKey }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/xa-guard
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "xa-guard.fullname" . }}-config
{{- end }}
