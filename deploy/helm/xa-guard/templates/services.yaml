{{- $root := . -}}
{{- $components := list
  (dict "name" "api" "enabled" .Values.api.enabled "port" .Values.api.service.port "targetPort" "http" "service" .Values.api.service)
  (dict "name" "business-api" "enabled" .Values.businessApi.enabled "port" .Values.businessApi.service.port "targetPort" "http" "service" .Values.businessApi.service)
  (dict "name" "console" "enabled" .Values.console.enabled "port" .Values.console.service.port "targetPort" "http" "service" .Values.console.service)
-}}
{{- range $component := $components }}
{{- if $component.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xa-guard.componentName" (dict "root" $root "component" $component.name) }}
  labels:
    {{- include "xa-guard.componentLabels" (dict "root" $root "component" $component.name) | nindent 4 }}
  {{- with $component.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $component.service.type }}
  selector:
    {{- include "xa-guard.componentSelectorLabels" (dict "root" $root "component" $component.name) | nindent 4 }}
  ports:
    - name: {{ $component.targetPort }}
      port: {{ $component.port }}
      targetPort: {{ $component.targetPort }}
      protocol: TCP
{{- end }}
{{- end }}
