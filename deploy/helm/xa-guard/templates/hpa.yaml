{{- $root := . -}}
{{- $components := list
  (dict "name" "api" "enabled" (and .Values.api.enabled .Values.api.autoscaling.enabled) "autoscaling" .Values.api.autoscaling)
  (dict "name" "business-api" "enabled" (and .Values.businessApi.enabled .Values.businessApi.autoscaling.enabled) "autoscaling" .Values.businessApi.autoscaling)
  (dict "name" "console" "enabled" (and .Values.console.enabled .Values.console.autoscaling.enabled) "autoscaling" .Values.console.autoscaling)
-}}
{{- range $component := $components }}
{{- if $component.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "xa-guard.componentName" (dict "root" $root "component" $component.name) }}
  labels:
    {{- include "xa-guard.componentLabels" (dict "root" $root "component" $component.name) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "xa-guard.componentName" (dict "root" $root "component" $component.name) }}
  minReplicas: {{ $component.autoscaling.minReplicas }}
  maxReplicas: {{ $component.autoscaling.maxReplicas }}
  metrics:
    {{- with $component.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with $component.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
{{- end }}
{{- end }}
