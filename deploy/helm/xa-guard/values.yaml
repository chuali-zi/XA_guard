nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []
  externalSecrets:
    # Provision these with an external-secrets controller or the platform.
    # The chart never renders credentials or encryption keys.
    runtime: xa-guard-runtime
    businessApi: xa-guard-business-api
    keyProvider: xa-guard-key-provider
  oidc:
    issuer: https://idp.example.gov/realms/xa-guard
    discoveryUrl: https://idp.example.gov/realms/xa-guard/.well-known/openid-configuration
    jwksUri: https://idp.example.gov/realms/xa-guard/protocol/openid-connect/certs
    backchannelBaseUrl: ""
    tokenEndpoint: ""
    audience: xa-guard-api
    publicClientId: xa-guard-console
    confidentialClientId: xa-guard-bff
    confidentialClientSecretKey: oidc-client-secret
    introspectionClientId: xa-guard-api
    introspectionClientSecretKey: oidc-introspection-client-secret
    introspectionRequired: true
    # HTTP remains reference-only. Production should leave this list unused
    # and use HTTPS endpoints.
    referenceHttpHosts: "keycloak,localhost,127.0.0.1"
  postgres:
    dsnSecretKey: database-url
    sslMode: verify-full
  kms:
    # Production defaults to an external HTTP key provider. Set provider=local
    # only for an explicitly approved development/reference profile.
    provider: http
    endpoint: https://kms.example.gov
    authTokenSecretKey: auth-token
    caSecretName: ""
    caSecretKey: ca.crt
    keyringSecretKey: kek-keyring
    referenceHttpHosts: ""
  internalAuthorizationSecretKey: internal-authorization-key

referenceInfra:
  # Reference dependencies remain outside the cluster. Enabling this flag only
  # marks the profile and permits explicitly allowlisted reference HTTP hosts.
  enabled: false
  # Deterministic file-based failure hooks are accepted only in the isolated
  # reference profile. Production always renders this false.
  testFaults: false

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true

config:
  logLevel: INFO
  contractsFile: /app/policies/baseline/tool_effects.yaml
  assignmentCeilingFile: /app/configs/governance.enterprise-static.yaml
  migrationRequired: true
  worker:
    leaseSeconds: 60
    heartbeatSeconds: 20
    retryScheduleSeconds: "5,30,120"
  jwks:
    staleGraceSeconds: 900

api:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/chuali-zi/xa-guard
    tag: "0.2.0"
    digest: ""
    pullPolicy: IfNotPresent
  command: ["python"]
  args: ["-m", "xa_guard.control.api"]
  containerPort: 8080
  terminationGracePeriodSeconds: 45
  preStopDelaySeconds: 5
  scheduling:
    podAntiAffinity:
      enabled: true
      required: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      minDomains: 2
  service:
    type: ClusterIP
    port: 80
    annotations: {}
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  probes:
    liveness:
      path: /livez
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /readyz
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    # Keep fixed two-replica placement while anti-affinity is required. Before
    # enabling HPA, add enough failure domains or make anti-affinity preferred.
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

worker:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/chuali-zi/xa-guard
    tag: "0.2.0"
    digest: ""
    pullPolicy: IfNotPresent
  command: ["python"]
  args: ["-m", "xa_guard.control.worker"]
  containerPort: 8082
  terminationGracePeriodSeconds: 90
  preStopDelaySeconds: 5
  scheduling:
    podAntiAffinity:
      enabled: true
      required: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      minDomains: 2
  service:
    type: ClusterIP
    port: 8082
    annotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 768Mi
  probes:
    liveness:
      path: /livez
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /readyz
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

businessApi:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/chuali-zi/xa-guard-business-api
    tag: "0.2.0"
    digest: ""
    pullPolicy: IfNotPresent
  command: ["python"]
  args: ["-m", "xa_guard.reference.ticket_api"]
  containerPort: 8081
  databaseDsnSecretKey: database-url
  apiKeySecretKey: api-key
  terminationGracePeriodSeconds: 30
  preStopDelaySeconds: 3
  service:
    type: ClusterIP
    port: 80
    annotations: {}
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  probes:
    liveness:
      path: /livez
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /readyz
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

console:
  enabled: true
  replicas: 1
  image:
    repository: ghcr.io/chuali-zi/xa-guard-console
    tag: "0.2.0"
    digest: ""
    pullPolicy: IfNotPresent
  command: []
  args: []
  containerPort: 8080
  terminationGracePeriodSeconds: 30
  preStopDelaySeconds: 3
  service:
    type: ClusterIP
    port: 80
    annotations: {}
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  probes:
    liveness:
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  pdb:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

migration:
  enabled: true
  image:
    repository: ghcr.io/chuali-zi/xa-guard
    tag: "0.2.0"
    digest: ""
    pullPolicy: IfNotPresent
  command: ["python"]
  args: ["-m", "xa_guard.control.migrate"]
  nameSuffix: ""
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: xa-guard.example.gov
      paths:
        - path: /control
          pathType: Prefix
          component: api
        - path: /mcp
          pathType: Prefix
          component: api
        - path: /
          pathType: Prefix
          component: console
  tls: []

networkPolicy:
  enabled: true
  defaultDeny: true
  dns:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns
    ports: [53]
  ingressController:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    podSelector:
      matchLabels:
        app.kubernetes.io/name: ingress-nginx
  monitoring:
    enabled: false
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
    podSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus
  # Standard NetworkPolicy cannot select FQDNs. Production operators must
  # resolve and maintain only the approved endpoint CIDRs for each dependency.
  # Empty CIDRs intentionally fail closed.
  dependencies:
    oidc:
      cidrs: []
      ports: [443]
    postgres:
      cidrs: []
      ports: [5432]
    keyProvider:
      cidrs: []
      ports: [443]
  components:
    api:
      extraIngress: []
      extraEgress: []
    worker:
      extraIngress: []
      extraEgress: []
    businessApi:
      extraIngress: []
      extraEgress: []
    console:
      extraIngress: []
      extraEgress: []
    migration:
      extraEgress: []
